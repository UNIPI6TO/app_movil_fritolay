name: Backend Tests (.NET)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
    paths:
      - 'src/backend/**'
      - 'src/backend.Tests/**'
      - '.github/workflows/backend-tests.yml'
  push:
    branches: [ main ]
    paths:
      - 'src/backend/**'
      - 'src/backend.Tests/**'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run Backend Unit Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: src/backend

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restaurar dependencias
      run: dotnet restore backend.sln

    - name: Compilar solución
      run: dotnet build backend.sln --configuration Release --no-restore

    - name: Ejecutar tests unitarios con cobertura
      id: tests
      run: |
        dotnet test backend.sln \
          --configuration Release \
          --no-build \
          --verbosity normal \
          --logger "trx;LogFileName=test-results.trx" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults 2>&1 | tee test-output.txt
        echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: Comentar resultados de tests en PR
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        header: backend-test-results
        message: |
          ## 🧪 Resultados de Tests Backend
          
          **Status**: ${{ steps.tests.outputs.exit_code == '0' && '✅ Todos los tests pasaron' || '❌ Algunos tests fallaron' }}
          
          <details>
          <summary>📊 Ver detalles de ejecución</summary>
          
          ```
          $(cat test-output.txt | tail -n 40)
          ```
          </details>
          
          ---
          *Workflow ejecutado en commit: ${{ github.sha }}*

    - name: Verificar que los tests pasaron
      if: steps.tests.outputs.exit_code != '0'
      run: exit 1

    - name: Publicar resultados de tests
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Backend Test Results
        path: src/backend/TestResults/test-results.trx
        reporter: dotnet-trx
        fail-on-error: true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: ./src/backend/TestResults/**/coverage.cobertura.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false

