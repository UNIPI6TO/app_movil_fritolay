name: CodeQL Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ release, develop  ]
    paths:
      - 'src/backend/**'
      - 'src/fritolay-app/**'
      - '.github/workflows/codeql-scan.yml'

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Análisis C# – Backend (.NET)
  # ─────────────────────────────────────────────
  analyze-backend:
    name: CodeQL – C# Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/backend

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Initialize CodeQL (C#)
      uses: github/codeql-action/init@v3
      with:
        languages: csharp
        build-mode: autobuild
        queries: security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis (C#)
      uses: github/codeql-action/analyze@v3
      with:
        category: '/language:csharp'

  # ─────────────────────────────────────────────
  # Job 2: Análisis TypeScript – Frontend Ionic
  # ─────────────────────────────────────────────
  analyze-frontend:
    name: CodeQL – TypeScript Frontend (Ionic)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/fritolay-app

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: src/fritolay-app/package-lock.json

    - name: Initialize CodeQL (TypeScript)
      uses: github/codeql-action/init@v3
      with:
        languages: javascript-typescript
        build-mode: none
        queries: security-and-quality

    - name: Perform CodeQL Analysis (TypeScript)
      uses: github/codeql-action/analyze@v3
      with:
        category: '/language:javascript-typescript'

  # ─────────────────────────────────────────────
  # Job 3: Comentar alertas reales en el PR
  # ─────────────────────────────────────────────
  comment-pr:
    name: Publicar alertas en PR
    runs-on: ubuntu-latest
    needs: [analyze-backend, analyze-frontend]
    if: always()
    permissions:
      pull-requests: write
      security-events: read

    steps:
    - name: Esperar procesamiento de alertas
      run: sleep 20

    - name: Consultar alertas y comentar en PR
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = context.payload.pull_request.number;
          const sha = context.payload.pull_request.head.sha;
          const { owner, repo } = context.repo;
          const securityUrl = `https://github.com/${owner}/${repo}/security/code-scanning?query=pr%3A${prNumber}`;

          // Obtener alertas de code scanning asociadas al commit del PR
          let alerts = [];
          try {
            const res = await github.rest.codeScanning.listAlertsForRepo({
              owner,
              repo,
              ref: sha,
              state: 'open',
              per_page: 100,
            });
            alerts = res.data;
          } catch (e) {
            console.log('No se pudieron obtener alertas:', e.message);
          }

          // Agrupar por severidad
          const bySev = (sev) => alerts.filter(a =>
            (a.rule.security_severity_level ?? a.rule.severity ?? '').toLowerCase() === sev
          );
          const critical = bySev('critical');
          const high     = bySev('high');
          const medium   = bySev('medium');
          const low      = bySev('low');
          const other    = alerts.filter(a =>
            !['critical','high','medium','low'].includes(
              (a.rule.security_severity_level ?? a.rule.severity ?? '').toLowerCase()
            )
          );

          const status = alerts.length === 0
            ? '✅ No se encontraron alertas de seguridad'
            : `⚠️ Se encontraron **${alerts.length}** alerta(s)`;

          // Tabla de hallazgos (máx. 20)
          const top = alerts.slice(0, 20);
          const rows = top.map(a => {
            const loc  = a.most_recent_instance?.location;
            const file = loc?.path ?? '?';
            const line = loc?.start_line ?? '?';
            const sev  = a.rule.security_severity_level ?? a.rule.severity ?? 'N/A';
            const desc = (a.rule.description ?? 'Sin descripción').replace(/\|/g, '\\|');
            return `| \`${a.rule.id}\` | ${desc} | ${sev} | \`${file}:${line}\` |`;
          });

          const findingsTable = top.length > 0
            ? [
                '<details>',
                `<summary>📋 Ver hallazgos detallados (${top.length}/${alerts.length})</summary>`,
                '',
                '| Regla | Descripción | Severidad | Ubicación |',
                '|---|---|---|---|',
                ...rows,
                '',
                '</details>',
              ].join('\n')
            : '';

          const marker = '<!-- codeql-scan-comment -->';
          const body = [
            marker,
            '## 🔍 CodeQL – Resultados del Análisis de Seguridad',
            '',
            `**Estado:** ${status}`,
            '',
            '### 📊 Resumen por severidad',
            '',
            '| Severidad | Cantidad |',
            '|---|---|',
            `| 🔴 Crítica | ${critical.length} |`,
            `| 🟠 Alta | ${high.length} |`,
            `| 🟡 Media | ${medium.length} |`,
            `| 🟢 Baja | ${low.length} |`,
            `| ⚪ Otras | ${other.length} |`,
            `| 📌 **Total** | **${alerts.length}** |`,
            '',
            findingsTable,
            '',
            `> 🔗 [Ver todas las alertas en Security → Code scanning](${securityUrl})`,
            `> *Commit: \`${sha}\`*`,
          ].join('\n');

          // Actualizar comentario existente o crear uno nuevo
          const { data: comments } = await github.rest.issues.listComments({
            owner, repo, issue_number: prNumber,
          });
          const existing = comments.find(c => c.body?.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner, repo, comment_id: existing.id, body,
            });
          } else {
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body,
            });
          }