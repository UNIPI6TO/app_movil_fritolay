name: CodeQL Security Scan

on:
  push:
    branches: [ main, develop, 'feature/*', 'fix/*' ]
    paths:
      - 'src/backend/**'
      - 'src/fritolay-app/**'
      - '.github/workflows/codeql-scan.yml'
  pull_request:
    branches: [ main, develop, 'feature/*', 'fix/*' ]
    paths:
      - 'src/backend/**'
      - 'src/fritolay-app/**'
  schedule:
    - cron: '0 3 * * 1'   # Cada lunes a las 03:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Análisis C# – Backend (.NET)
  # ─────────────────────────────────────────────
  analyze-backend:
    name: CodeQL – C# Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/backend

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Initialize CodeQL (C#)
      uses: github/codeql-action/init@v3
      with:
        languages: csharp
        build-mode: autobuild
        queries: security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis (C#)
      uses: github/codeql-action/analyze@v3
      with:
        category: '/language:csharp'

  # ─────────────────────────────────────────────
  # Job 2: Análisis TypeScript – Frontend Ionic
  # ─────────────────────────────────────────────
  analyze-frontend:
    name: CodeQL – TypeScript Frontend (Ionic)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/fritolay-app

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: src/fritolay-app/package-lock.json

    - name: Initialize CodeQL (TypeScript)
      uses: github/codeql-action/init@v3
      with:
        languages: javascript-typescript
        build-mode: none          # TS/JS no requiere compilación para CodeQL
        queries: security-and-quality

    - name: Perform CodeQL Analysis (TypeScript)
      uses: github/codeql-action/analyze@v3
      with:
        category: '/language:javascript-typescript'
