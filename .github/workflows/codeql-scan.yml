name: CodeQL Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/backend/**'
      - 'src/fritolay-app/**'
      - '.github/workflows/codeql-scan.yml'

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

jobs:
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 1: AnГЎlisis C# вЂ“ Backend (.NET)
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  analyze-backend:
    name: CodeQL вЂ“ C# Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/backend

    steps:
    - name: Checkout cГіdigo
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Initialize CodeQL (C#)
      uses: github/codeql-action/init@v3
      with:
        languages: csharp
        build-mode: autobuild
        queries: security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis (C#)
      uses: github/codeql-action/analyze@v3
      with:
        category: '/language:csharp'
        output: ${{ github.workspace }}/results/csharp

    - name: Extraer hallazgos del SARIF (C#)
      if: always()
      id: sarif_csharp
      shell: bash
      run: |
        SARIF_DIR="$GITHUB_WORKSPACE/results/csharp"
        SARIF_FILE=$(find "$SARIF_DIR" -name "*.sarif" 2>/dev/null | head -1)
        echo "SARIF encontrado: $SARIF_FILE"
        if [ -n "$SARIF_FILE" ] && [ -f "$SARIF_FILE" ]; then
          TOTAL=$(jq '[.runs[].results // []] | map(length) | add // 0' "$SARIF_FILE")
          ERRORS=$(jq '[.runs[].results[]? | select(.level=="error")] | length' "$SARIF_FILE")
          WARNINGS=$(jq '[.runs[].results[]? | select(.level=="warning")] | length' "$SARIF_FILE")
          NOTES=$(jq '[.runs[].results[]? | select(.level=="note" or .level==null)] | length' "$SARIF_FILE")
          FINDINGS=$(jq -r '
            .runs[].results[]? |
            "- **[" + (.ruleId // "N/A") + "]** " +
            (.message.text // "sin mensaje") +
            " вЂ” `" + (.locations[0].physicalLocation.artifactLocation.uri // "?") +
            ":" + ((.locations[0].physicalLocation.region.startLine // 0) | tostring) + "`"
          ' "$SARIF_FILE" | head -20)
          [ -z "$FINDINGS" ] && FINDINGS="_Sin hallazgos._"
        else
          TOTAL=0; ERRORS=0; WARNINGS=0; NOTES=0
          FINDINGS="_SARIF no encontrado en $SARIF_DIR_"
        fi
        echo "total=$TOTAL" >> $GITHUB_OUTPUT
        echo "errors=$ERRORS" >> $GITHUB_OUTPUT
        echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
        echo "notes=$NOTES" >> $GITHUB_OUTPUT
        { echo "findings<<EOF"; echo "$FINDINGS"; echo "EOF"; } >> $GITHUB_OUTPUT

    - name: Comentar resultados CodeQL (C#) en PR
      uses: marocchino/sticky-pull-request-comment@v2
      if: always()
      with:
        header: codeql-csharp
        message: |
          ## рџ”Ќ CodeQL вЂ“ AnГЎlisis de Seguridad C# (.NET Backend)
          > рџ”— [Ver resultados completos en Security в†’ Code scanning](https://github.com/${{ github.repository }}/security/code-scanning?query=pr%3A${{ github.event.pull_request.number }})
          >
          > *Commit: `${{ github.sha }}`*

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 2: AnГЎlisis TypeScript вЂ“ Frontend Ionic
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  analyze-frontend:
    name: CodeQL вЂ“ TypeScript Frontend (Ionic)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/fritolay-app

    steps:
    - name: Checkout cГіdigo
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: src/fritolay-app/package-lock.json

    - name: Initialize CodeQL (TypeScript)
      uses: github/codeql-action/init@v3
      with:
        languages: javascript-typescript
        build-mode: none          # TS/JS no requiere compilaciГіn para CodeQL
        queries: security-and-quality

    - name: Perform CodeQL Analysis (TypeScript)
      uses: github/codeql-action/analyze@v3
      with:
        category: '/language:javascript-typescript'
        output: ${{ github.workspace }}/results/javascript

    - name: Extraer hallazgos del SARIF (TypeScript)
      if: always()
      id: sarif_ts
      shell: bash
      run: |
        SARIF_DIR="$GITHUB_WORKSPACE/results/javascript"
        SARIF_FILE=$(find "$SARIF_DIR" -name "*.sarif" 2>/dev/null | head -1)
        echo "SARIF encontrado: $SARIF_FILE"
        if [ -n "$SARIF_FILE" ] && [ -f "$SARIF_FILE" ]; then
          TOTAL=$(jq '[.runs[].results // []] | map(length) | add // 0' "$SARIF_FILE")
          ERRORS=$(jq '[.runs[].results[]? | select(.level=="error")] | length' "$SARIF_FILE")
          WARNINGS=$(jq '[.runs[].results[]? | select(.level=="warning")] | length' "$SARIF_FILE")
          NOTES=$(jq '[.runs[].results[]? | select(.level=="note" or .level==null)] | length' "$SARIF_FILE")
          FINDINGS=$(jq -r '
            .runs[].results[]? |
            "- **[" + (.ruleId // "N/A") + "]** " +
            (.message.text // "sin mensaje") +
            " вЂ” `" + (.locations[0].physicalLocation.artifactLocation.uri // "?") +
            ":" + ((.locations[0].physicalLocation.region.startLine // 0) | tostring) + "`"
          ' "$SARIF_FILE" | head -20)
          [ -z "$FINDINGS" ] && FINDINGS="_Sin hallazgos._"
        else
          TOTAL=0; ERRORS=0; WARNINGS=0; NOTES=0
          FINDINGS="_SARIF no encontrado en $SARIF_DIR_"
        fi
        echo "total=$TOTAL" >> $GITHUB_OUTPUT
        echo "errors=$ERRORS" >> $GITHUB_OUTPUT
        echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
        echo "notes=$NOTES" >> $GITHUB_OUTPUT
        { echo "findings<<EOF"; echo "$FINDINGS"; echo "EOF"; } >> $GITHUB_OUTPUT

    - name: Comentar resultados CodeQL (TypeScript) en PR
      uses: marocchino/sticky-pull-request-comment@v2
      if: always()
      with:
        header: codeql-typescript
        message: |
          ## рџ”Ќ CodeQL вЂ“ AnГЎlisis de Seguridad TypeScript (Ionic Frontend)
          ${{ steps.sarif_ts.outputs.findings }}

          > рџ”— [Ver resultados completos en Security в†’ Code scanning](https://github.com/${{ github.repository }}/security/code-scanning?query=pr%3A${{ github.event.pull_request.number }})
          >
          > *Commit: `${{ github.sha }}`*
