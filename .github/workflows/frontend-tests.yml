name: Frontend Tests (Angular/Ionic)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
    paths:
      - 'src/fritolay-app/**'
      - '.github/workflows/frontend-tests.yml'
  push:
    branches: [ main ]
    paths:
      - 'src/fritolay-app/**'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run Frontend Unit Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: src/fritolay-app

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: src/fritolay-app/package-lock.json

    - name: Instalar dependencias
      run: npm ci

    - name: Verificar formato de código
      run: npm run lint
      continue-on-error: true

    - name: Ejecutar tests con cobertura
      id: tests
      run: |
        npm run test:ci 2>&1 | tee test-output.txt
        TEST_EXIT_CODE=${PIPESTATUS[0]}
        echo "exit_code=$TEST_EXIT_CODE" >> $GITHUB_OUTPUT
        exit $TEST_EXIT_CODE
      env:
        CHROME_BIN: /usr/bin/google-chrome-stable
      continue-on-error: true

    - name: Extraer resultados de tests
      if: always()
      id: test_results
      run: |
        if [ -f test-output.txt ]; then
          # Extraer resumen de tests
          SUMMARY=$(grep -A 5 "TOTAL:" test-output.txt || echo "No se encontró resumen")
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Extraer cobertura
          COVERAGE=$(grep -A 10 "Coverage summary" test-output.txt || echo "")
          echo "coverage<<EOF" >> $GITHUB_OUTPUT
          echo "$COVERAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Extraer últimas líneas completas
          DETAILS=$(tail -n 40 test-output.txt)
          echo "details<<EOF" >> $GITHUB_OUTPUT
          echo "$DETAILS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Mostrar en el log del workflow
          echo "### 📊 Resumen de Tests ###"
          echo "$SUMMARY"
          echo ""
          echo "### 📈 Cobertura de Código ###"
          echo "$COVERAGE"
        fi

    - name: Comentar resultados de tests en PR
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request' && always()
      with:
        header: frontend-test-results
        message: |
          ## 🧪 Resultados de Tests Frontend
          
          **Status**: ${{ steps.tests.outputs.exit_code == '0' && '✅ Todos los tests pasaron' || '❌ Algunos tests fallaron' }}
          
          ### 📊 Resumen de Tests
          ```
          ${{ steps.test_results.outputs.summary }}
          ```
          
          ### 📈 Cobertura de Código
          ```
          ${{ steps.test_results.outputs.coverage }}
          ```
          
          <details>
          <summary>🔍 Ver detalles completos de ejecución</summary>
          
          ```
          ${{ steps.test_results.outputs.details }}
          ```
          </details>
          
          ---
          *Workflow ejecutado en commit: `${{ github.sha }}`*

    - name: Verificar que los tests pasaron
      if: steps.tests.outputs.exit_code != '0'
      run: exit 1

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: ./src/fritolay-app/coverage/app/lcov.info
        flags: frontend
        name: frontend-coverage
        fail_ci_if_error: false

    - name: Comentar cobertura en PR
      uses: romeovs/lcov-reporter-action@v0.3.1
      if: github.event_name == 'pull_request'
      with:
        lcov-file: ./src/fritolay-app/coverage/app/lcov.info
        github-token: ${{ secrets.GITHUB_TOKEN }}
        delete-old-comments: true

  build-check:
    name: Verificar Build de Producción
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: src/fritolay-app

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: src/fritolay-app/package-lock.json

    - name: Instalar dependencias
      run: npm ci

    - name: Build para producción
      run: npm run build --if-present

    - name: Verificar tamaño de bundle
      run: |
        if [ -d "www" ]; then
          echo "📦 Tamaño del bundle:"
          du -sh www/
          find www/ -name "*.js" -exec ls -lh {} \; | awk '{print $5, $9}'
        fi

  security-check:
    name: Verificación de Seguridad
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: src/fritolay-app

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: src/fritolay-app/package-lock.json

    - name: Instalar dependencias
      run: npm ci

    - name: Verificar vulnerabilidades críticas y altas
      id: audit
      run: |
        npm audit 2>&1 | tee audit-report.txt
        
        # Extraer información del reporte
        CRITICAL_COUNT=$(grep -ci 'critical' audit-report.txt || echo "0")
        HIGH_COUNT=$(grep -ci 'high' audit-report.txt || echo "0")
        MODERATE_COUNT=$(grep -ci 'moderate' audit-report.txt || echo "0")
        
        echo "critical=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
        echo "high=$HIGH_COUNT" >> $GITHUB_OUTPUT
        echo "moderate=$MODERATE_COUNT" >> $GITHUB_OUTPUT
        
        exit 0
      continue-on-error: true

    - name: Preparar reporte de auditoría
      if: always()
      id: prep_audit
      run: |
        # Copiar reporte a directorio accesible
        cp audit-report.txt /tmp/audit-report.txt
        # Preparar contenido para embedding
        REPORT_CONTENT=$(cat audit-report.txt)
        echo "AUDIT_REPORT<<EOF_AUDIT" >> $GITHUB_ENV
        echo "$REPORT_CONTENT" >> $GITHUB_ENV
        echo "EOF_AUDIT" >> $GITHUB_ENV

    - name: Comentar auditoría de seguridad en PR
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request' && always()
      with:
        header: security-audit
        message: |
          ## 🔒 Auditoría de Seguridad - npm audit
          
          ### 📊 Resumen de Vulnerabilidades
          - 🔴 **Críticas:** ${{ steps.audit.outputs.critical }}
          - 🟠 **Altas:** ${{ steps.audit.outputs.high }}
          - 🟡 **Moderadas:** ${{ steps.audit.outputs.moderate }}
          
          <details>
          <summary>📋 Ver reporte completo</summary>
          
          ```
          ${{ env.AUDIT_REPORT }}
          ```
          
          </details>
          
          ### 💡 Recomendaciones
          - Para ignorar vulnerabilidades no críticas: `npm audit --audit-level=critical`
          - Para actualizar paquetes: `npm audit fix` o `npm audit fix --force`
          - Más información: [npm audit documentation](https://docs.npmjs.com/cli/audit)
          
          ---
          *Auditoría ejecutada para commit: `${{ github.sha }}`*

    - name: Mostrar reporte de auditoría en logs
      if: always()
      run: |
        echo "## 🔒 Reporte de Seguridad - npm audit" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Vulnerabilidades Detectadas:" >> $GITHUB_STEP_SUMMARY
        echo "- **Críticas:** ${{ steps.audit.outputs.critical }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Altas:** ${{ steps.audit.outputs.high }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Moderadas:** ${{ steps.audit.outputs.moderate }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Reporte Completo:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        cat audit-report.txt >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

    - name: Verificar dependencias desactualizadas
      id: outdated
      run: |
        echo "### 📦 Dependencias Desactualizadas" >> $GITHUB_STEP_SUMMARY
        npm outdated 2>&1 | tee outdated-report.txt || true
        exit 0

    - name: Fallar si hay vulnerabilidades críticas
      if: steps.audit.outputs.critical != '0'
      run: |
        echo "❌ Se encontraron vulnerabilidades CRÍTICAS que deben ser corregidas"
        exit 1
