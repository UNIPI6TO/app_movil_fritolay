name: validate-flow
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Validar Origen y Destino
        uses: actions/github-script@v7
        with:
          script: |
            const base = context.payload.pull_request.base.ref;
            const head = context.payload.pull_request.head.ref;
            const prNumber = context.payload.pull_request.number;

            let error = null;

            if (base === 'main' && head !== 'release') {
              error = `❌ **PR rechazado:** La rama \`main\` solo acepta PRs desde \`release\`.\n\n> Rama origen detectada: \`${head}\`\n\nEste PR ha sido cerrado automáticamente.`;
            } else if (base === 'release' && head !== 'develop') {
              error = `❌ **PR rechazado:** La rama \`release\` solo acepta PRs desde \`develop\`.\n\n> Rama origen detectada: \`${head}\`\n\nEste PR ha sido cerrado automáticamente.`;
            }

            if (error) {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: error
              });

              await github.rest.pulls.update({
                pull_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed'
              });

              core.setFailed(error);
            } else {
              console.log(`✅ Flujo válido: ${head} → ${base}`);
            }